<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JeongYS Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="vendor/highlight-github-dark.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 스크롤 진행 표시바 -->
  <div id="scrollProgressBar"></div>

  <!-- 고정 헤더 -->
  <header class="site-header" id="siteHeader">
    <div class="header-brand">Portfolio</div>
    <div class="header-actions">
      <button class="btn-resume" id="resumeBtn">Resume 열람하기</button>
    </div>
  </header>

  <!-- ───────────── INTRO ───────────── -->
  <section id="intro" class="intro-section">
    <div class="intro-sticky" id="introSticky">

      <!-- ── 슬라이드 1: 안녕하세요 + Position 도넛차트 ── -->
      <div class="intro-slide" id="introSlide0">
        <div class="slide-layout">
          <div class="slide-heading">
            <div class="slide-big-line" id="s1Line1">안녕하세요</div>
            <div class="slide-big-line" id="s1Line2">저는 정영섭 이고요</div>
          </div>

          <div class="s1-bottom-row">
            <!-- 도넛 차트 -->
            <div class="donut-outer" id="s1Chart">
              <div class="donut-inner">
                <svg class="donut-svg" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <!-- 배경 링 -->
                  <circle class="donut-track" cx="100" cy="100" r="66"/>
                  <!-- GUI Design 10% — 연한 노란색, 마지막 세그먼트 -->
                  <circle class="donut-seg donut-gui" cx="100" cy="100" r="66"
                    stroke-dasharray="0 414.69" stroke-dashoffset="-373.22"
                    transform="rotate(-90 100 100)"/>
                  <!-- UI/UX Planning 40% — 주황 -->
                  <circle class="donut-seg donut-uiux" cx="100" cy="100" r="66"
                    stroke-dasharray="0 414.69" stroke-dashoffset="-207.35"
                    transform="rotate(-90 100 100)"/>
                  <!-- PM 50% — 노랑, 12시 방향부터 시작 -->
                  <circle class="donut-seg donut-pm" cx="100" cy="100" r="66"
                    stroke-dasharray="0 414.69" stroke-dashoffset="0"
                    transform="rotate(-90 100 100)"/>
                  <!-- 중앙 텍스트 -->
                  <text class="donut-center-text" x="100" y="100"
                    text-anchor="middle" dominant-baseline="middle">Position</text>
                </svg>
                <!-- 외부 레이블 -->
                <div class="d-label d-label-pm" id="s1LabelPm">PM<br><b>50%</b></div>
                <div class="d-label d-label-uiux" id="s1LabelUiux">UI/UX Planning<br><b>40%</b></div>
                <div class="d-label d-label-gui" id="s1LabelGui">GUI Design<br><b>10%</b></div>
              </div>
            </div>
            <!-- "입니다." -->
            <div class="slide-big-line s1-suffix" id="s1Suffix">입니다.</div>
          </div>

        </div>
      </div>

      <!-- ── 슬라이드 2: 제가 주로 해왔던 작업을 ── -->
      <div class="intro-slide" id="introSlide1">
        <div class="slide-layout">
          <div class="slide-heading">
            <div class="slide-big-line" id="s2Line1">제가 주로 해왔던 작업을</div>
            <div class="slide-big-line" id="s2Line2">나열해 봤습니다.</div>
          </div>
        </div>
      </div>

      <!-- ── 슬라이드 3: "우리(=회사)가…" 인용구 ── -->
      <div class="intro-slide" id="introSlide2">
        <div class="slide-layout slide-layout-quote">
          <div class="slide-heading">
            <div class="slide-big-line s3-quote-line" id="s3Line1">
              <span class="quote-mark">"</span><span class="quote-highlight">우리(=회사)가</span>
            </div>
            <div class="slide-big-line" id="s3Line2">써먹을 만한 능력이 있나?!"</div>
            <div class="slide-big-line" id="s3Line3">싶은게 있었으면 좋겠군요.</div>
          </div>
        </div>
      </div>

      <!-- 닷 네비게이터 -->
      <div class="intro-dots" id="introDots">
        <span class="intro-dot active" data-index="0"></span>
        <span class="intro-dot" data-index="1"></span>
        <span class="intro-dot" data-index="2"></span>
      </div>

      <!-- 스크롤 유도 -->
      <div class="intro-cue" id="introCue">
        <span>Scroll</span>
        <div class="intro-cue-arrow"></div>
      </div>

    </div>
  </section>

  <!-- ───────────── CARDS ───────────── -->
  <section id="cards" class="cards-section">
    <div class="cards-section-inner">
      <div class="cards-grid" id="cardsGrid">
        <!-- JS가 cards.json 기반으로 렌더링 -->
        <div class="cards-loading" id="cardsLoading">
          <div class="spinner"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- ───────────── 카드 상세 팝업 ───────────── -->
  <div id="cardPopup" class="popup" role="dialog" aria-modal="true" aria-label="포트폴리오 상세">
    <div class="popup-backdrop" id="cardPopupBackdrop"></div>

    <!-- ── 카드 목록 네비게이션 (dim 영역에 위치) ── -->
    <nav class="popup-nav" id="cardPopupNav" aria-label="카드 목록 네비게이션">
      <button class="popup-nav-arrow popup-nav-prev" id="cardNavPrev" aria-label="이전">
        <svg width="7" height="12" viewBox="0 0 7 12" fill="none"><path d="M6 1L1 6L6 11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="popup-nav-track" id="cardNavTrack"></div>
      <button class="popup-nav-arrow popup-nav-next" id="cardNavNext" aria-label="다음">
        <svg width="7" height="12" viewBox="0 0 7 12" fill="none"><path d="M1 1L6 6L1 11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </nav>

    <div class="popup-panel" id="cardPopupPanel">
      <button class="popup-close" id="cardPopupClose" aria-label="닫기">✕</button>
      <div class="popup-scroll-wrap" id="cardPopupScroll">
        <!-- 상단 센티넬: 이전 카드 로딩 트리거 -->
        <div class="popup-sentinel" id="cardTopSentinel"></div>
        <!-- 동적으로 카드 블록 삽입 -->
        <div class="popup-blocks" id="cardPopupBlocks"></div>
        <!-- 하단 센티넬: 다음 카드 로딩 트리거 -->
        <div class="popup-sentinel" id="cardBottomSentinel"></div>
      </div>
    </div>
  </div>

  <!-- ───────────── 이력서 팝업 ───────────── -->
  <div id="resumePopup" class="popup" role="dialog" aria-modal="true" aria-label="Resume">
    <div class="popup-backdrop" id="resumePopupBackdrop"></div>
    <div class="popup-panel" id="resumePopupPanel">
      <button class="popup-close" id="resumePopupClose" aria-label="닫기">✕</button>
      <div class="popup-scroll-wrap" id="resumePopupScroll">
        <div class="popup-blocks" id="resumePopupBlocks">
          <div class="cards-loading">
            <div class="spinner"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Go to Top 버튼 -->
  <button class="go-top-btn" id="goTopBtn" aria-label="맨 위로">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M8 12V4M8 4L4 8M8 4L12 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span>Top</span>
  </button>

  <script src="vendor/highlight.min.js"></script>
  <script src="script.js?v=9"></script>
</body>
</html>
