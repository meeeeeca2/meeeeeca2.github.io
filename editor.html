<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="editor.css">
</head>
<body>

  <!-- ── 사이드바: 카드 목록 ── -->
  <aside id="edSidebar">
    <div class="ed-sidebar-header">
      <span>카드 목록</span>
      <button id="edNewCard" title="새 카드 만들기">+</button>
    </div>
    <ul id="edCardList">
      <li class="ed-card-placeholder">카드를 불러오는 중...</li>
    </ul>
  </aside>

  <!-- ── 메인 에디터 영역 ── -->
  <main id="edMain">

    <!-- 상단 바 -->
    <header id="edTopbar">
      <div class="ed-topbar-left">
        <span id="edCardId" class="ed-card-id-display">← 왼쪽에서 카드를 선택하세요</span>
      </div>
      <div class="ed-topbar-right">
        <button id="edMoreBtn" class="ed-more-btn" disabled title="페이지 설정">···</button>
        <button id="edSaveBtn" class="ed-save-btn" disabled>저장 (⌘S)</button>
      </div>
    </header>

    <!-- 스크롤 영역 -->
    <div id="edScroll">

      <!-- 카드 메타 정보 -->
      <section id="edMeta">
        <input id="edTitle" type="text"
          placeholder="카드 제목을 입력하세요..."
          class="ed-title-input" disabled>
        <div class="ed-meta-row">
          <input id="edTags" type="text"
            placeholder="태그 (쉼표로 구분: PM, 기획, UX)"
            class="ed-meta-input" disabled>
          <input id="edDesc" type="text"
            placeholder="한 줄 설명 (선택사항)"
            class="ed-meta-input" disabled>
        </div>
      </section>

      <!-- 블록 에디터 -->
      <section id="edBlocks"></section>

      <!-- 블록 추가 버튼 -->
      <div id="edAddArea">
        <button id="edAddBlockBtn" disabled>+ 블록 추가</button>
      </div>

    </div>
  </main>

  <!-- ── 페이지 설정 메뉴 ── -->
  <div id="edMoreMenu" class="ed-more-menu hidden">
    <div class="ed-more-item" id="edMoreFullwidth">
      <span class="ed-more-icon">⟷</span>
      <span class="ed-more-label">전체 너비</span>
      <div class="ed-more-toggle" id="edMoreFullwidthToggle"></div>
    </div>
  </div>

  <!-- ── 블록 컨텍스트 메뉴 ── -->
  <div id="edBlockCtxMenu" class="ed-ctx-menu hidden">
    <!-- YouTube 전용 -->
    <button class="ed-ctx-item" id="edCtxYoutubeUrl">
      <span class="ed-ctx-icon">▶</span>
      <span class="ed-ctx-label">URL 변경</span>
    </button>
    <div class="ed-ctx-sep" id="edCtxYoutubeUrlSep"></div>
    <!-- 전환 -->
    <button class="ed-ctx-item ed-ctx-has-sub" id="edCtxConvert">
      <span class="ed-ctx-icon">↔</span>
      <span class="ed-ctx-label">전환</span>
      <span class="ed-ctx-arrow">›</span>
    </button>
    <div class="ed-ctx-sep" id="edCtxConvertSep"></div>
    <!-- 색 -->
    <button class="ed-ctx-item ed-ctx-has-sub" id="edCtxColor">
      <span class="ed-ctx-icon ed-ctx-color-a">A</span>
      <span class="ed-ctx-label">색</span>
      <span class="ed-ctx-arrow">›</span>
    </button>
    <div class="ed-ctx-sep" id="edCtxColorSep"></div>
    <!-- 공통 -->
    <button class="ed-ctx-item" id="edCtxDuplicate">
      <span class="ed-ctx-icon">⧉</span>
      <span class="ed-ctx-label">복제</span>
    </button>
    <button class="ed-ctx-item" id="edCtxMoveUp">
      <span class="ed-ctx-icon">↑</span>
      <span class="ed-ctx-label">위로 이동</span>
    </button>
    <button class="ed-ctx-item" id="edCtxMoveDown">
      <span class="ed-ctx-icon">↓</span>
      <span class="ed-ctx-label">아래로 이동</span>
    </button>
    <div class="ed-ctx-sep"></div>
    <button class="ed-ctx-item ed-ctx-danger" id="edCtxDelete">
      <span class="ed-ctx-icon">✕</span>
      <span class="ed-ctx-label">삭제</span>
    </button>
  </div>

  <!-- ── 블록 타입 전환 서브메뉴 ── -->
  <div id="edBlockSubMenu" class="ed-ctx-menu ed-ctx-submenu hidden"></div>

  <!-- ── 블록 색상 서브메뉴 ── -->
  <div id="edBlockColorSub" class="ed-ctx-menu ed-ctx-submenu ed-color-sub hidden"></div>

  <!-- ── 블록 타입 선택 팔레트 ── -->
  <div id="edPalette" class="ed-palette hidden">
    <div id="edPaletteList"></div>
  </div>

  <!-- ── 새 카드 모달 ── -->
  <div id="edNewCardModal" class="ed-modal hidden">
    <div class="ed-modal-content">
      <h3>새 카드 만들기</h3>
      <p class="ed-modal-hint">카드 ID는 폴더명이 됩니다.<br>영문, 숫자, 언더스코어 사용 권장 (예: 007_analysis)</p>
      <input id="edNewCardId" type="text"
        placeholder="예: 007_pm_case_study"
        class="ed-modal-input">
      <div class="ed-modal-actions">
        <button id="edNewCardCancel" class="ed-btn-secondary">취소</button>
        <button id="edNewCardConfirm" class="ed-btn-primary">만들기</button>
      </div>
    </div>
  </div>

  <!-- ── 토스트 알림 ── -->
  <div id="edToast" class="ed-toast hidden"></div>

  <!-- ── 인라인 포맷팅 툴바 (텍스트 선택 시 표시) ── -->
  <div id="edInlineToolbar" class="ed-inline-toolbar hidden">
    <button class="ed-it-btn ed-it-color-btn" data-cmd="color" title="색">
      <span class="ed-it-a" id="edItColorA">A</span>
    </button>
    <div class="ed-it-sep"></div>
    <button class="ed-it-btn" data-cmd="bold"          title="굵게 (Ctrl+B)"><b>B</b></button>
    <button class="ed-it-btn" data-cmd="italic"        title="기울기 (Ctrl+I)"><i>I</i></button>
    <button class="ed-it-btn" data-cmd="underline"     title="밑줄 (Ctrl+U)"><u>U</u></button>
    <button class="ed-it-btn" data-cmd="strikeThrough" title="취소선"><s>S</s></button>
    <button class="ed-it-btn" data-cmd="inlineCode"    title="인라인 코드">&lt;/&gt;</button>
  </div>

  <!-- ── 인라인 색상 피커 ── -->
  <div id="edInlineColorPicker" class="ed-color-picker hidden"></div>

  <script src="editor.js"></script>
</body>
</html>
